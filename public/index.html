<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PromptStack</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <div class="app">
    <header>
      <div class="header-left">
        <h1><span class="logo-icon">&#x1F4DA;</span> PromptStack</h1>
        <span class="tagline">Prompt version control for AI power users</span>
      </div>
      <div class="header-right">
        <div class="search-bar">
          <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
          <input type="text" id="searchInput" placeholder="Search prompts...">
        </div>
        <button class="btn btn-primary" onclick="openCreateModal()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>
          New Prompt
        </button>
      </div>
    </header>

    <div class="stats-bar" id="statsBar"></div>

    <main>
      <div class="prompt-grid" id="promptGrid">
        <div class="empty-state" id="emptyState">
          <div class="empty-icon">&#x2728;</div>
          <h2>No prompts yet</h2>
          <p>Create your first prompt to get started with version control.</p>
          <button class="btn btn-primary" onclick="openCreateModal()">Create Your First Prompt</button>
        </div>
      </div>
    </main>
  </div>

  <div class="modal-overlay" id="createModal">
    <div class="modal">
      <div class="modal-header">
        <h2>Create New Prompt</h2>
        <button class="modal-close" onclick="closeModal('createModal')">&times;</button>
      </div>
      <form id="createForm" onsubmit="handleCreate(event)">
        <div class="form-group">
          <label>Name</label>
          <input type="text" name="name" required placeholder="e.g., Code Review Helper">
        </div>
        <div class="form-group">
          <label>Description</label>
          <input type="text" name="description" placeholder="What does this prompt do?">
        </div>
        <div class="form-group">
          <label>Category</label>
          <select name="category">
            <option value="general">General</option>
            <option value="coding">Coding</option>
            <option value="writing">Writing</option>
            <option value="analysis">Analysis</option>
            <option value="creative">Creative</option>
            <option value="business">Business</option>
          </select>
        </div>
        <div class="form-group">
          <label>Content</label>
          <textarea name="content" rows="8" placeholder="Enter your prompt content here..."></textarea>
        </div>
        <div class="form-actions">
          <button type="button" class="btn btn-secondary" onclick="closeModal('createModal')">Cancel</button>
          <button type="submit" class="btn btn-primary">Create Prompt</button>
        </div>
      </form>
    </div>
  </div>

  <div class="modal-overlay" id="detailModal">
    <div class="modal modal-large">
      <div class="modal-header">
        <h2 id="detailTitle"></h2>
        <button class="modal-close" onclick="closeModal('detailModal')">&times;</button>
      </div>
      <div id="detailContent"></div>
    </div>
  </div>

  <div class="modal-overlay" id="versionModal">
    <div class="modal">
      <div class="modal-header">
        <h2>Add New Version</h2>
        <button class="modal-close" onclick="closeModal('versionModal')">&times;</button>
      </div>
      <form id="versionForm" onsubmit="handleAddVersion(event)">
        <input type="hidden" name="promptId" id="versionPromptId">
        <div class="form-group">
          <label>Content</label>
          <textarea name="content" rows="8" placeholder="Enter the new version content..." required></textarea>
        </div>
        <div class="form-group">
          <label>Notes</label>
          <input type="text" name="notes" placeholder="What changed in this version?">
        </div>
        <div class="form-group">
          <label>Model</label>
          <input type="text" name="model" placeholder="e.g., GPT-4, Claude 3.5">
        </div>
        <div class="form-actions">
          <button type="button" class="btn btn-secondary" onclick="closeModal('versionModal')">Cancel</button>
          <button type="submit" class="btn btn-primary">Add Version</button>
        </div>
      </form>
    </div>
  </div>

  <div class="modal-overlay" id="diffModal">
    <div class="modal modal-large">
      <div class="modal-header">
        <h2>Compare Versions</h2>
        <button class="modal-close" onclick="closeModal('diffModal')">&times;</button>
      </div>
      <div id="diffContent"></div>
    </div>
  </div>

  <div class="toast-container" id="toastContainer"></div>

  <script src="/app.js"></script>
</body>
</html>
